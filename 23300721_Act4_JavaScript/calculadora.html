<html>

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>Calculadora</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="javascript/main.js" defer></script>
</head>
 
<body>

    <div class="parent">

        <div class="calculadora">

            <div class="pantalla"><span id="ultimaExpresion"></span><input id="expresionAritmetica" type="text"></div>

            <div class="botones">

                <div class="boton div1"><button type="button">clr</button></div>
                <div class="boton div2"><button type="button">/</button></div>
                <div class="boton div3"><button type="button">*</button></div>
                <div class="boton div4"><button type="button">-</button></div>
                <div class="boton div5"><button type="button">7</button></div>
                <div class="boton div6"><button type="button">8</button></div>
                <div class="boton div7"><button type="button">9</button></div>
                <div class="boton div8"><button type="button">+</button></div>
                <div class="boton div9"><button type="button">4</button></div>
                <div class="boton div10"><button type="button">5</button></div>
                <div class="boton div11"><button type="button">6</button></div>
                <div class="boton div12"><button type="button">1</button></div>
                <div class="boton div13"><button type="button">2</button></div>
                <div class="boton div14"><button type="button">3</button></div>
                <div class="boton div15"><button type="button">↵</button></div>
                <div class="boton div16"><button type="button">0</button></div>
                <div class="boton div17"><button type="button">.</button></div>

            </div>

        </div>

    </div>

</body>

</html>
